@{
ViewData["Title"] = "Contact Us";
}

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
    }

    /* HERO SECTION */
    .contact-hero {
        text-align: center;
        padding: 100px 20px 60px;
    }

    .contact-hero h1 {
        font-size: 50px;
        font-weight: 800;
        letter-spacing: 2px;
    }

    .contact-hero p {
        opacity: 0.8;
        margin-top: 15px;
    }

    /* MAIN SECTION */
    .contact-wrapper {
        padding: 60px 0;
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        transition: 0.4s ease;
    }

    .glass-card:hover {
        transform: translateY(-8px);
    }

    /* FLOATING INPUTS */
    .form-group {
        position: relative;
        margin-bottom: 30px;
    }

    .form-control {
        width: 100%;
        padding: 14px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255, 255, 255, 0.1);
        color: white;
    }

    .form-control::placeholder {
        color: transparent;
    }

    .form-label {
        position: absolute;
        top: 14px;
        left: 14px;
        font-size: 14px;
        opacity: 0.7;
        transition: 0.3s;
    }

    .form-control:focus+.form-label,
    .form-control:not(:placeholder-shown)+.form-label {
        top: -10px;
        left: 10px;
        font-size: 12px;
        background: #2ecc71;
        padding: 2px 8px;
        border-radius: 10px;
        opacity: 1;
    }

    /* BUTTON */
    .btn-football {
        background: #2ecc71;
        border: none;
        padding: 12px 35px;
        border-radius: 30px;
        font-weight: 700;
        color: black;
        transition: 0.3s ease;
    }

    .btn-football:hover {
        background: #27ae60;
        transform: scale(1.05);
    }

    /* CONTACT INFO */
    .info-item {
        display: flex;
        align-items: center;
        margin-bottom: 25px;
    }

    .info-item i {
        font-size: 22px;
        margin-right: 15px;
        color: #2ecc71;
    }

    /* SOCIAL */
    .social-icons a {
        margin-right: 15px;
        font-size: 20px;
        color: white;
        transition: 0.3s;
    }

    .social-icons a:hover {
        color: #2ecc71;
        transform: translateY(-5px);
    }

    iframe {
        width: 100%;
        border-radius: 20px;
        margin-top: 50px;
    }

    /* RESPONSIVE */
    @media(max-width:768px) {
        .contact-hero h1 {
            font-size: 35px;
        }

        .glass-card {
            padding: 25px;
        }
    }
</style>

<!-- HERO -->
<div class="contact-hero">
    <h1>⚽ GET IN TOUCH</h1>
    <p>Have questions about jerseys? Let’s talk football.</p>
</div>

<div class="container contact-wrapper">
    <div class="row g-4">

        <!-- FORM -->
        <div class="col-md-6">
            <div class="glass-card">
                <form>

                    <div class="form-group">
                        <input type="text" class="form-control" placeholder=" " required>
                        <label class="form-label">Full Name</label>
                    </div>

                    <div class="form-group">
                        <input type="email" class="form-control" placeholder=" " required>
                        <label class="form-label">Email Address</label>
                    </div>

                    <div class="form-group">
                        <textarea class="form-control" rows="4" placeholder=" " required></textarea>
                        <label class="form-label">Your Message</label>
                    </div>

                    <button class="btn btn-football">Send Message</button>

                </form>
            </div>
        </div>

        <!-- INFO -->
        <div class="col-md-6">
            <div class="glass-card">

                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    Mumbai, India
                </div>

                <div class="info-item">
                    <i class="fas fa-phone"></i>
                    +91 98765 43210
                </div>

                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    support@footballstore.com
                </div>

                <div class="social-icons mt-4">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                </div>

            </div>
        </div>

    </div>

    <!-- MAP -->
    <iframe src="https://maps.google.com/maps?q=mumbai&t=&z=13&ie=UTF8&iwloc=&output=embed" height="300"
        allowfullscreen>
    </iframe>

</div>
