<!DOCTYPE html>
<html>

<head>
    <title>Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

    <div class="max-w-lg mx-auto bg-white p-6 rounded-2xl shadow">
        <h2 class="text-2xl font-bold mb-4">Checkout</h2>

        <input placeholder="Full Name" class="w-full border p-2 mb-3 rounded">
        <input placeholder="Address" class="w-full border p-2 mb-3 rounded">
        <input placeholder="Phone Number" class="w-full border p-2 mb-3 rounded">

        <button onclick="alert('Order Placed Successfully!')" class="w-full bg-black text-white py-2 rounded-xl">
            Place Order
        </button>
    </div>

</body>

</html>
